<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Bengali</title>
    <style>
        :root {
            --bg-color: #FFFDE7;
            --text-color: #424242;
            --header-bg: #FFFFFF;
            --border-color: #FFF59D;
            
            --primary-yellow: #FFEB3B;
            --primary-yellow-hover: #FDD835;
            --primary-yellow-active: #FBC02D;
            
            --card-bg: #FFFFFF;
            --btn-bg: #FFFFFF;
            
            --success-color: #81C784;
            --error-color: #E57373;
            
            --shadow-sm: 0 4px 12px rgba(253, 216, 53, 0.15);
            --shadow-md: 0 8px 24px rgba(253, 216, 53, 0.2);
            
            --squircle-sm: 16px;
            --squircle-md: 24px;
            --squircle-lg: 32px;
            
            --font-family: system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--header-bg);
            border-bottom: 2px solid var(--border-color);
            padding: 1rem;
            box-shadow: var(--shadow-sm);
            border-bottom-left-radius: var(--squircle-md);
            border-bottom-right-radius: var(--squircle-md);
        }

        .filter-container {
            max-width: 650px;
            margin: 0 auto;
            display: flex;
            flex-wrap: nowrap;
            gap: 0.75rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
        }
        
        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            flex-shrink: 0;
            background-color: var(--btn-bg);
            color: var(--text-color);
            border: 2px solid var(--primary-yellow);
            padding: 0.6rem 1.5rem;
            border-radius: var(--squircle-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: capitalize;
            white-space: nowrap;
        }

        .filter-btn:hover {
            background-color: #FFFDE7;
        }

        .filter-btn.active {
            background-color: var(--primary-yellow);
            border-color: var(--primary-yellow);
            box-shadow: var(--shadow-sm);
            color: #000;
        }

        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            z-index: 10;
        }

        .quiz-card {
            background-color: var(--card-bg);
            width: 100%;
            padding: 2rem;
            border-radius: var(--squircle-lg);
            box-shadow: var(--shadow-md);
            text-align: center;
            border: 2px solid #FFF9C4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .top-play-btn {
            background-color: var(--primary-yellow);
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: var(--squircle-md);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .top-play-btn:hover {
            background-color: var(--primary-yellow-hover);
            transform: translateY(-2px);
        }

        .top-play-btn:active {
            transform: scale(0.95);
        }
        
        .top-play-btn svg {
            width: 20px;
            height: 20px;
            fill: #000;
        }

        .question-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            width: 100%;
        }

        .question-text {
            font-size: 1.75rem;
            font-weight: 700;
            color: #212121;
        }

        .question-text span {
            color: #F57F17;
        }

        .options-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: stretch;
            gap: 1.5rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        .option-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex: 1;
        }

        .option-btn {
            width: 100%;
            flex: 1;
            background-color: var(--btn-bg);
            border: 2px solid var(--border-color);
            padding: 2rem 1rem;
            border-radius: var(--squircle-lg);
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .option-emoji {
            font-size: 4rem;
            line-height: 1;
            transition: transform 0.2s ease;
        }

        .option-text {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-yellow);
            background-color: var(--bg-color);
            transform: translateY(-4px);
            box-shadow: var(--shadow-sm);
        }
        
        .option-btn:hover:not(:disabled) .option-emoji {
            transform: scale(1.1);
        }

        .option-btn:disabled {
            cursor: default;
        }
        
        /* Kids mode lock styles */
        .option-btn.kids-locked {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #fafafa !important;
            border-color: #eeeeee !important;
            transform: none !important;
            box-shadow: none !important;
        }
        
        .option-btn.kids-locked .option-emoji {
            filter: grayscale(100%);
            opacity: 0.6;
        }

        .audio-btn {
            background-color: #FFFDE7;
            border: 2px solid var(--border-color);
            border-radius: var(--squircle-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        
        .question-audio-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            padding: 10px;
        }

        .option-audio-btn {
            width: 100%;
            height: 48px;
            order: -1;
        }

        .audio-btn:hover {
            background-color: var(--primary-yellow);
            border-color: var(--primary-yellow);
        }
        
        .audio-btn:active {
            transform: scale(0.95);
        }

        .audio-btn svg {
            width: 24px;
            height: 24px;
            fill: #F57F17;
            transition: fill 0.2s ease;
        }
        
        .audio-btn:hover svg {
            fill: #000;
        }

        .option-wrapper.correct .option-btn {
            background-color: var(--success-color);
            border-color: var(--success-color);
            color: white;
            box-shadow: 0 4px 12px rgba(129, 199, 132, 0.4);
        }
        
        .option-wrapper.correct .option-audio-btn {
             border-color: var(--success-color);
        }

        .option-wrapper.incorrect .option-btn {
            background-color: var(--error-color);
            border-color: var(--error-color);
            color: white;
            opacity: 0.8;
        }
        
        .option-wrapper.incorrect .option-audio-btn {
             border-color: var(--error-color);
             opacity: 0.8;
        }

        .filter-btn.list-btn {
            margin-left: auto;
            background-color: #fff8e1;
            border-color: var(--primary-yellow);
        }

        /* List view styles */
        #list-view {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 1.5rem 1rem 2rem;
        }

        #list-view.visible {
            display: flex;
        }

        .list-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: var(--squircle-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 2px solid #FFF9C4;
        }

        .list-table thead tr {
            background-color: var(--primary-yellow);
        }

        .list-table th {
            padding: 0.85rem 1rem;
            font-size: 1rem;
            font-weight: 700;
            text-align: left;
            color: #000;
        }

        .list-table th:last-child,
        .list-table td:last-child {
            text-align: center;
        }

        .list-table tbody tr {
            border-top: 1px solid #FFF9C4;
            transition: background 0.15s;
        }

        .list-table tbody tr:hover {
            background-color: #FFFDE7;
        }

        .list-table td {
            padding: 0.7rem 1rem;
            font-size: 1rem;
            color: var(--text-color);
        }

        .list-table td.emoji-cell {
            font-size: 1.5rem;
        }

        .list-table td.bn-cell {
            font-weight: 600;
        }

        .list-category-heading {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #F57F17;
            background: #FFFDE7 !important;
            padding: 0.5rem 1rem !important;
        }

        /* List Format for Questions */
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            margin-top: 0.5rem;
        }

        .list-question-item {
            background: #fff;
            border: 2px solid #FFF59D;
            border-radius: var(--squircle-md);
            padding: 1.25rem;
            box-shadow: var(--shadow-sm);
            text-align: left;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .list-question-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .list-question-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #212121;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            line-height: 1.4;
        }

        .list-question-options {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .list-opt {
            font-size: 0.95rem;
            font-weight: 700;
            padding: 0.4rem 0.8rem;
            border-radius: var(--squircle-sm);
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .list-opt.correct {
            background-color: #E8F5E9;
            color: #2E7D32;
            border: 1px solid #A5D6A7;
        }

        .list-opt.incorrect {
            background-color: #FFEBEE;
            color: #C62828;
            border: 1px solid #EF9A9A;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>

        // TTS System
        const synth = window.speechSynthesis;
        let bengaliVoice = null;
        let englishVoice = null;
        let ttsAvailable = false;

        function populateVoiceList() {
            if (!synth) { disableAudioUI(); return; }
            const voices = synth.getVoices();
            if (voices.length > 0) {
                ttsAvailable = true;
                bengaliVoice = voices.find(voice => voice.lang.toLowerCase().includes('bn'));
                englishVoice = voices.find(voice => voice.lang.toLowerCase().includes('en'));
            }
        }

        if (synth) {
            populateVoiceList();
            if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = populateVoiceList;
        } else {
            disableAudioUI();
        }

        function disableAudioUI() {
            ttsAvailable = false;
            const style = document.createElement('style');
            style.innerHTML = '.audio-btn, .top-play-btn { display: none !important; }';
            document.head.appendChild(style);
            unlockOptions(); // Fallback: Unlock options automatically if TTS isn't available
        }

        function speak(text, isBengali, onEndCallback = null) {
            if (!ttsAvailable || !synth) {
                if (onEndCallback) setTimeout(onEndCallback, 1500);
                return;
            }
            if (synth.speaking) synth.cancel();
            if (text !== '') {
                const utterThis = new SpeechSynthesisUtterance(text);
                if (isBengali) {
                    if (bengaliVoice) utterThis.voice = bengaliVoice;
                    utterThis.lang = 'bn-IN';
                } else {
                    if (englishVoice) utterThis.voice = englishVoice;
                    utterThis.lang = 'en-US';
                }
                utterThis.rate = 0.85;
                if (onEndCallback) {
                    utterThis.onend = onEndCallback;
                    utterThis.onerror = onEndCallback;
                }
                synth.speak(utterThis);
            } else if (onEndCallback) {
                onEndCallback();
            }
        }

        const categoryLabels = { animals: 'Animals', trees: 'Trees', human: 'Human', others: 'Others' };

        function buildListTable(filter) {
            // Clean both containers first
            listTbody.innerHTML = '';
            listQuestionsContainer.innerHTML = '';

            if (filter === 'questions') {
                // Hide table, Show card list
                listTableWrapper.style.display = 'none';
                listQuestionsContainer.style.display = 'flex';

                const questionsData = vocabData.filter(i => i.isQuestion);
                questionsData.forEach(q => {
                    const correctOpt = q.options.find(o => o.bn === q.bn);
                    const wrongOpt = q.options.find(o => o.bn !== q.bn);

                    const qItem = document.createElement('div');
                    qItem.className = 'list-question-item';
                    qItem.innerHTML = `
                        <div class="list-question-title">❓ ${q.questionText}</div>
                        <div class="list-question-options">
                            <span class="list-opt correct">✔️ ${correctOpt.bn} ${correctOpt.emoji}</span>
                            <span class="list-opt incorrect">❌ ${wrongOpt.bn} ${wrongOpt.emoji}</span>
                        </div>
                    `;
                    listQuestionsContainer.appendChild(qItem);
                });
            } else {
                // Show table, Hide card list
                listTableWrapper.style.display = 'block';
                listQuestionsContainer.style.display = 'none';

                const data = (filter === 'all' || filter === 'kids'
                    ? vocabData 
                    : vocabData.filter(i => i.category === filter)
                ).filter(i => !i.isQuestion);

                if (filter === 'all' || filter === 'kids') {
                    categoryOrder.forEach(cat => {
                        const items = data.filter(i => i.category === cat);
                        if (!items.length) return;
                        const headRow = document.createElement('tr');
                        headRow.innerHTML = `<td colspan="3" class="list-category-heading">${categoryLabels[cat]}</td>`;
                        listTbody.appendChild(headRow);
                        items.forEach(item => appendRow(item));
                    });
                } else {
                    data.forEach(item => appendRow(item));
                }
            }
        }

        function appendRow(item) {
            const tr = document.createElement('tr');

                <td>${item.en}</td>
                <td class="bn-cell">${item.bn}</td>
                <td class="emoji-cell">${item.emoji}</td>
            `;
            listTbody.appendChild(tr);
        }

                    speak(currentItem.questionText, true);
                } else if (currentItem) {
                    speak(`${currentEnglishWord} মানে কী?`, true);
                }
                unlockOptions(); // Unlock logic for Kids Mode
            });
        });

        function setupFilters() {
            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    currentFilter = button.getAttribute('data-filter');
                    if (listVisible) {
                        buildListTable(currentFilter);
                    } else {
                        loadCategory(currentFilter);
                    }
                });
            });
        }
        
        function unlockOptions() {
            if (currentFilter !== 'kids') return;
            audioPlayedForCurrentQuestion = true;
            const lockedBtns = optionsContainer.querySelectorAll('.kids-locked');
            lockedBtns.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('kids-locked');
            });
        }

        function loadCategory(filter) {
            if (filter === 'all' || filter === 'kids') {
                currentQuestions = [...vocabData];
            } else if (filter === 'questions') {
                currentQuestions = vocabData.filter(item => item.isQuestion);
            } else {
                currentQuestions = vocabData.filter(item => item.category === filter && !item.isQuestion);
            }
            shuffleArray(currentQuestions);
            currentQuestionIndex = 0;

            if (currentQuestions.length > 0) {
                renderQuestion();
            } else {
                questionText.innerHTML = "No words available.";
                optionsContainer.innerHTML = "";
                if (ttsAvailable) {
                    questionAudioBtn.style.display = 'none';
                    topPlayBtn.style.display = 'none';
                }
            }
        }

        function renderQuestion() {
            audioPlayedForCurrentQuestion = false; // Reset lock for new question
            
            if (ttsAvailable) {
                questionAudioBtn.style.display = 'flex';
                topPlayBtn.style.display = 'inline-flex';
            }

            const currentItem = currentQuestions[currentQuestionIndex];
            if (!currentItem) return;
            
            let options = [];
            if (currentItem.isQuestion) {
                correctAnswer = currentItem.bn;
                currentEnglishWord = "";
                questionText.innerHTML = currentItem.questionText;
                
                // For conceptual questions, load predefined correct & distractor options
                options = [...currentItem.options];
            } else {
                correctAnswer = currentItem.bn;
                currentEnglishWord = currentItem.en;
                questionText.innerHTML = `<span>${currentItem.en}</span> মানে কী?`;
                
                // Classic vocabulary distractor logic
                const wrongItem = getDistractorItem(currentItem);
                options = [
                    { bn: currentItem.bn, emoji: currentItem.emoji },
                    { bn: wrongItem.bn, emoji: wrongItem.emoji }
                ];
            }
            
            shuffleArray(options);
            
            topPlayBtn.onclick = () => {
                let fullSentence = "";
                if (currentItem.isQuestion) {
                    fullSentence = `${currentItem.questionText}, বলো তো, ${options[0].bn}, নাকি, ${options[1].bn}?`;
                } else {
                    fullSentence = `${currentEnglishWord}, মানে কী? ${options[0].bn}, নাকি, ${options[1].bn}?`;
                }
                speak(fullSentence, true);
                unlockOptions(); // Unlock options once audio play is triggered
            };

            optionsContainer.innerHTML = "";
            options.forEach(optItem => {
                const wrapper = document.createElement('div');
                wrapper.className = 'option-wrapper';
                wrapper.dataset.value = optItem.bn;

                const textBtn = document.createElement('button');
                textBtn.className = 'option-btn';
                
                // Lock buttons strictly if Kids Mode is on and TTS is available 
                if (currentFilter === 'kids' && !audioPlayedForCurrentQuestion && ttsAvailable) {
                    textBtn.disabled = true;
                    textBtn.classList.add('kids-locked');
                }
                
                textBtn.innerHTML = `
                    <div class="option-emoji">${optItem.emoji}</div>
                    <div class="option-text">${optItem.bn}</div>
                `;
                textBtn.onclick = () => handleAnswer(wrapper, optItem.bn === correctAnswer);

                const audioBtn = document.createElement('button');
                audioBtn.className = 'audio-btn option-audio-btn';
                audioBtn.setAttribute('aria-label', `Play audio for ${optItem.bn}`);
                audioBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                `;
                audioBtn.onclick = (e) => {
                    e.stopPropagation();
                    speak(optItem.bn, true);
                };

                wrapper.appendChild(audioBtn);
                wrapper.appendChild(textBtn);
                optionsContainer.appendChild(wrapper);
            });
        }

        function getDistractorItem(correctItem) {
            const sameCategoryItems = vocabData.filter(item => 
                item.category === correctItem.category && item.en !== correctItem.en && !item.isQuestion
            );
            if (sameCategoryItems.length > 0) {
                return sameCategoryItems[Math.floor(Math.random() * sameCategoryItems.length)];
            }
            return vocabData.find(item => item.en !== correctItem.en && !item.isQuestion);
        }

        function handleAnswer(clickedWrapper, isCorrect) {
            const allWrappers = optionsContainer.querySelectorAll('.option-wrapper');
            allWrappers.forEach(wrapper => {
                wrapper.querySelector('.option-btn').disabled = true;
            });

            const currentItem = currentQuestions[currentQuestionIndex];

            if (isCorrect) {
                clickedWrapper.classList.add('correct');
                fireConfetti();
                
                let feedbackText = "";
                if (currentItem.isQuestion) {
                    feedbackText = `দারুণ! ${correctAnswer} একদম সঠিক উত্তর।`;
                } else {
                    feedbackText = `${currentEnglishWord} মানে ${correctAnswer}`;
                }

                speak(feedbackText, true, () => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex >= currentQuestions.length) {
                        shuffleArray(currentQuestions);
                        currentQuestionIndex = 0;
                    }
                    renderQuestion();
                });
            } else {
                clickedWrapper.classList.add('incorrect');
                allWrappers.forEach(wrapper => {
                    if (wrapper.dataset.value === correctAnswer) {
                        wrapper.classList.add('correct');
                    }
                });
                setTimeout(renderQuestion, 1500);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- Confetti ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let confettiActive = false;
        let animationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function fireConfetti() {
            const colors = ['#FFEB3B', '#81C784', '#F48FB1', '#64B5F6', '#FFB74D'];
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    dx: Math.random() * 4 - 2,
                    dy: Math.random() * 5 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5
                });
            }
            if (!confettiActive) {
                confettiActive = true;
                renderConfetti();
            }
        }

        function renderConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let activeParticles = 0;
            particles.forEach(p => {
                p.y += p.dy;
                p.x += p.dx;
                p.tilt += 0.1;
                if (p.y < canvas.height) {
                    activeParticles++;
                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                    ctx.stroke();
                }
            });
            if (activeParticles > 0) {
                animationId = requestAnimationFrame(renderConfetti);
            } else {
                confettiActive = false;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }
    </script>
</body>
